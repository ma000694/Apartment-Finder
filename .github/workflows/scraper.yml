name: Weekly UMN Scraper

on:
  schedule:
    - cron: "0 0 * * 0" # sundays at midnight
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run UMN scraper
        run: python data-scraping/getListingsData.py

      - name: Commit CSV results to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data-scraping/scraped-csv/
          git diff --staged --quiet || git commit -m "Weekly scrape: update housing data $(date +'%Y-%m-%d')"
          git push